spring:
  application:
    name: fin-ap-spring-batch
  
  datasource:
    url: jdbc:postgresql://localhost:5433/erp_fin_ap_phase1
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

logging:
  level:
    org.springframework.batch: INFO
    com.opengov.erp.ap: DEBUG

# Vendor API Configuration
vendor:
  api:
    base-url: http://test.vendor.api
    timeout: 5000